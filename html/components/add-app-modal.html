<div id="add-app-modal">
  <div>
    <h3 style="margin-bottom: 12px" data-i18n="newAppTitle">New App</h3>
    <input id="add-app-url" type="text" placeholder="Enter website URL" data-i18n="enterUrl" />
    <div id="default-apps-list"></div>
    <div class="add-app-actions">
      <button id="add-app-cancel" data-i18n="cancel">Cancel</button>
      <button id="add-app-confirm" data-i18n="create">Create</button>
    </div>
  </div>
</div>
