<div class="todo-section">
  <div class="todo-header">
    <h3 class="todo-title" data-i18n="todoList">Todo List</h3>
    <div class="todo-stats">
      <div class="progress-ring">
        <svg class="progress-ring-circle" width="40" height="40">
          <circle cx="20" cy="20" r="16" stroke="rgba(255,255,255,0.2)" stroke-width="3" fill="none"/>
          <circle cx="20" cy="20" r="16" stroke="#2196f3" stroke-width="3" fill="none" stroke-linecap="round"
                  transform="rotate(-90 20 20)" stroke-dasharray="100.53" stroke-dashoffset="0"/>
        </svg>
        <span class="progress-text">0%</span>
      </div>
    </div>
  </div>

  <div class="todo-controls">
    <div class="todo-input-container">
      <input type="text" id="todo-input" placeholder="{{addTodoPlaceholder}}" data-i18n="addTodoPlaceholder" maxlength="200" />
      <div class="custom-date-picker">
        <button type="button" id="date-picker-trigger" class="date-picker-trigger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span id="selected-date-text" data-i18n="dueDate">Due Date</span>
        </button>
        <input type="hidden" id="todo-due-date" />
        <div id="custom-calendar" class="custom-calendar">
          <div class="calendar-header">
            <button type="button" id="prev-month" class="calendar-nav-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15,18 9,12 15,6"></polyline>
              </svg>
            </button>
            <div class="calendar-title">
              <span id="calendar-month"></span>
              <span id="calendar-year"></span>
            </div>
            <button type="button" id="next-month" class="calendar-nav-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9,18 15,12 9,6"></polyline>
              </svg>
            </button>
          </div>
          <div class="calendar-weekdays">
            <span data-i18n="sunday">Su</span>
            <span data-i18n="monday">Mo</span>
            <span data-i18n="tuesday">Tu</span>
            <span data-i18n="wednesday">We</span>
            <span data-i18n="thursday">Th</span>
            <span data-i18n="friday">Fr</span>
            <span data-i18n="saturday">Sa</span>
          </div>
          <div id="calendar-days" class="calendar-days"></div>
          <div class="calendar-footer">
            <button type="button" id="clear-date" class="calendar-btn secondary" data-i18n="clearDate">Clear</button>
            <button type="button" id="today-date" class="calendar-btn secondary" data-i18n="todayDate">Today</button>
          </div>
        </div>
      </div>
      <button id="add-todo-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <div class="todo-filters">
      <div class="bulk-actions" id="bulk-actions" style="display: none;">
        <button id="select-all-btn" class="bulk-btn">Select All</button>
        <button id="complete-selected-btn" class="bulk-btn">Complete</button>
        <button id="delete-selected-btn" class="bulk-btn danger">Delete</button>
        <span id="selected-count">0 selected</span>
      </div>
    </div>
  </div>

  <div class="todo-list-container">
    <ul id="todo-list" class="todo-list"></ul>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14,2 14,8 20,8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10,9 9,9 8,9"></polyline>
        </svg>
      </div>
      <p>No todos yet. Add one above!</p>
      <small>Try adding due dates for better organization.</small>
    </div>
  </div>
</div>
